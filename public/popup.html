<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Chrome Extension</title>
    <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app">
    <h1 class="window-title">Ergo Names Extension</h1>
    <p class="window-subtitle">Powered By Ergo</p>
    <hr class="divider" />
    <input class="search-input" id="search" placeholder="Search for an Ergo Name...">
    <button class="search-button" id="button">Search</button>
    <hr class="divider" />
    <h1 class="address-text" id="address">Resolved Address</h1>
    <button class="copy-button" id="copy-address">Copy Address</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
