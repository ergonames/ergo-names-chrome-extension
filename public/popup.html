<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Chrome Extension</title>
    <link rel="stylesheet" href="popup.css" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.6.1/css/all.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <h1 class="window-title">Ergo Names Extension</h1>
      <p class="window-subtitle">Powered By Ergo</p>
      <hr class="divider" />
    </header>

    <div class="section" id="home-page">
      <input class="search-input" id="search" placeholder="Search for an Ergo Name...">
      <button class="search-button" id="button">Search</button>
      <hr class="divider" />
      <button class="copy-button" id="copy-address">Resolved ErgoName</button>
    </div>

    <div class="section" id="settings-page" style="display: none;">
      <h1 class="settings-title">Extension Version: <span class="settings-value">0.1.1</span></h1>
      <h1 class="settings-title">Network Type: <span class="settings-value">TESTNET</span></h1>
    </div>
    
    <footer>
      <ul class="toolbar">
        <button class="toolbar-button" id="home-button"><i class="fas fa-home"></i></button>
        <button class="toolbar-button" id="settings-button"><i class="fas fa-cog"></i></button>
      </ul>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
